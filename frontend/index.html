<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger & Pizza Hub</title>
    <style>
        :root {
            --primary-color: #ff5722;
            --secondary-color: #ff9800;
            --bg-dark: #121212;
            --surface-dark: #1e1e1e;
            --text-light: #ffffff;
            --text-muted: #aaaaaa;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #d84315 0%, var(--primary-color) 100%);
            padding: 1.5rem 2rem;
            box-shadow: 0 4px 15px rgba(255, 87, 34, 0.3);
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        header p {
            margin: 5px 0 0;
            color: #ffeee5;
            font-weight: 300;
        }

        /* Layout principal a dos columnas */
        .container {
            display: flex;
            flex-wrap: wrap;
            padding: 2rem;
            gap: 2rem;
            flex: 1;
        }

        /* Panel izquierdo: Formulario */
        .form-panel {
            flex: 1;
            min-width: 300px;
            background-color: var(--surface-dark);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            border-top: 4px solid var(--primary-color);
            height: fit-content;
        }

        .form-panel h2 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 8px rgba(255, 87, 34, 0.2);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s, transform 0.1s;
            text-transform: uppercase;
        }

        button:hover {
            background-color: #e64a19;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Panel derecho: Tabla de productos */
        .list-panel {
            flex: 2;
            min-width: 400px;
            background-color: var(--surface-dark);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        .list-panel h2 {
            margin-top: 0;
            color: var(--secondary-color);
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #333;
        }

        th {
            background-color: #2a2a2a;
            color: var(--primary-color);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        tbody tr:hover {
            background-color: #252525;
        }

        .delete-btn {
            background-color: #d32f2f;
            padding: 6px 12px;
            font-size: 0.9rem;
            width: auto;
        }

        .delete-btn:hover {
            background-color: #b71c1c;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .list-panel {
                min-width: 100%;
                overflow-x: auto;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Burger & Pizza Hub</h1>
        <p>Sistema de Gestión de Menú (Despliegue EKS - CI/CD) test 1</p>
    </header>

    <div class="container">
        <!-- Panel Izquierdo: Formulario -->
        <aside class="form-panel">
            <h2 id="formTitle">+ Nuevo Plato</h2>

            <div id="producto-form">
                <div class="form-group">
                    <label for="nombre">Nombre del Plato</label>
                    <input type="text" id="nombre" placeholder="Ej: Pizza Napolitana" />
                </div>

                <div class="form-group">
                    <label for="descripcion">Descripción / Ingredientes</label>
                    <textarea id="descripcion" rows="3" placeholder="Ej: Queso mozzarella, tomate, albahaca fresca"></textarea>
                </div>

                <div class="form-group">
                    <label for="precio">Precio ($)</label>
                    <input type="number" id="precio" placeholder="Ej: 12500" />
                </div>

                <div class="form-group">
                    <label for="stock">Stock Disponible</label>
                    <input type="number" id="stock" placeholder="Ej: 20" />
                </div>

                <div style="display: flex; gap: 10px;">
                    <button id="btnGuardar">Guardar en Menú</button>
                    <button id="btnCancelar" style="background-color: #555;">Cancelar</button>
                </div>

                <div id="status" style="margin-top: 15px; font-weight: bold; text-align: center;"></div>
            </div>
        </aside>

        <!-- Panel Derecho: Lista / Tabla -->
        <main class="list-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px;">
                <h2 style="border: none; margin: 0; padding: 0;">Menú Actual</h2>
                <button id="btnCargar" style="width: auto; padding: 6px 12px; font-size: 0.9rem;">Recargar</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tbodyProductos">
                </tbody>
            </table>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
